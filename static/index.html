<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabic TTS Studio</title>
  <link rel="stylesheet" href="style.css?v=16">
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────── -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon">🎙</div>
      <div class="brand-text">
        <span class="brand-en">Arabic TTS Studio</span>
        <span class="brand-ar">استوديو تحويل النص إلى كلام</span>
      </div>
    </div>
    <div class="status-row" id="status-row">
      <!-- status badges injected by JS -->
    </div>
  </header>

  <!-- ── Main layout ──────────────────────────────────────── -->
  <main class="workspace">

    <!-- Left panel: controls ─────────────── -->
    <div class="left-panel">

      <!-- Model cards -->
      <section class="panel-section">
        <h3 class="section-label">النموذج</h3>
        <div class="model-cards" id="model-cards">
          <!-- Cards rendered by JS -->
        </div>
      </section>

      <!-- Simplified mode: advanced compose/prep/parameter/compare controls are intentionally hidden. -->

      <!-- Voice picker -->
      <section class="panel-section">
        <h3 class="section-label">الصوت</h3>
        <div class="voice-picker">
          <label class="param-label" for="voice-select">الصوت</label>
          <select class="param-select" id="voice-select"></select>
        </div>
      </section>

      <!-- Compare mode -->
      <section class="panel-section">
        <div class="compare-toggle">
          <span>قارن نفس النص باستخدام كل النماذج المتاحة</span>
        </div>
        <div class="compare-checks hidden" id="compare-checks"></div>
        <button class="btn-compare" id="btn-compare" type="button" disabled>
          <span id="compare-label">قارن الآن</span>
        </button>
      </section>

      <!-- Text input -->
      <section class="panel-section">
        <h3 class="section-label">
          النص
          <span class="char-count" id="char-count">0</span>
        </h3>
        <textarea
          id="text-input"
          dir="auto"
          placeholder="اكتب النص العربي هنا…  |  Type text here…"
          rows="6"
          spellcheck="false"
        ></textarea>
        <div class="input-footer simple-footer">
          <button class="btn-ghost btn-xs" id="btn-clear-text">مسح</button>
        </div>
      </section>

      <!-- Synthesize button -->
      <div class="synth-wrap">
        <button class="btn-synth" id="btn-synth" disabled>
          <span class="synth-icon">▶</span>
          <span id="synth-label">توليد الصوت</span>
        </button>
        <div class="synth-progress hidden" id="synth-progress">
          <div class="progress-track">
            <div class="progress-fill indeterminate" id="progress-fill"></div>
          </div>
          <span class="progress-hint" id="progress-hint">جاري التوليد…</span>
        </div>
      </div>

    </div><!-- /left-panel -->

    <!-- Right panel: output + history ───── -->
    <div class="right-panel">

      <!-- Audio player -->
      <section class="panel-section player-card" id="player-card">
        <h3 class="section-label">المخرجات</h3>

        <div class="player-empty" id="player-empty">
          <div class="empty-icon">🔈</div>
          <p>سيظهر الصوت المولّد هنا بعد الضغط على "توليد الصوت"</p>
        </div>

        <div class="player-content hidden" id="player-content">
          <div class="waveform-wrap">
            <canvas id="waveform" height="72"></canvas>
            <div class="waveform-progress" id="waveform-progress" style="width:0%"></div>
          </div>
          <div class="player-bar">
            <button class="btn-play" id="btn-play">▶</button>
            <span class="time-display">
              <span id="cur-time">0:00</span>
              <span class="time-sep">/</span>
              <span id="tot-time">0:00</span>
            </span>
            <span class="player-badges" id="player-badges"></span>
            <a class="btn-dl" id="btn-dl" download>⬇ تنزيل</a>
          </div>
          <div class="player-insights" id="player-insights"></div>
          <audio id="audio-el" preload="metadata"></audio>
        </div>
      </section>

      <!-- Comparisons library: live + old runs, each expandable inline (hidden until one exists) -->
      <section class="panel-section saved-compare-card" id="saved-compare-card" hidden>
        <div class="history-header">
          <h3 class="section-label">المقارنة</h3>
          <div class="history-controls">
            <button class="btn-ghost btn-xs" id="btn-toggle-compares" data-expand="1">فتح الكل</button>
            <button class="btn-ghost btn-xs" id="btn-clear-compares">مسح الكل</button>
          </div>
        </div>
        <div class="saved-compare-list" id="saved-compare-list">
          <!-- comparison cards (expandable) rendered by JS -->
        </div>
      </section>

      <!-- History -->
      <section class="panel-section history-card">
        <div class="history-header">
          <h3 class="section-label">السجل</h3>
          <div class="history-controls">
            <button class="btn-ghost btn-xs" id="btn-toggle-history" aria-expanded="true" aria-controls="history-list">طي</button>
            <select class="filter-select" id="history-filter">
              <option value="all">كل النماذج</option>
              <option value="omnivoice_ft">OmniVoice المحسّن</option>
              <option value="omnivoice_base">OmniVoice الأصلي</option>
            </select>
            <button class="btn-ghost btn-xs" id="btn-clear-history">مسح الكل</button>
          </div>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty" id="history-empty">
            <p>لا توجد مقاطع صوتية بعد</p>
          </div>
        </div>
      </section>

    </div><!-- /right-panel -->

  </main>

  <!-- Toast notification -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js?v=27"></script>
</body>
</html>
